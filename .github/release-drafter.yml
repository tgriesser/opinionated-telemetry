name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
categories:
  - title: Breaking Changes
    labels:
      - breaking
  - title: Features
    labels:
      - enhancement
      - feature
  - title: Bug Fixes
    labels:
      - bug
      - fix
  - title: Maintenance
    labels:
      - chore
      - refactor
      - build
      - ci
      - test
      - performance
      - perf
      - docs
      - documentation
  - title: Other Changes
    labels:
      - '*'

# Pre-1.0 versioning: breaking changes bump minor (0.1.0 -> 0.2.0), everything
# else is patch by default. Add the `enhancement` or `feature` label by hand
# when a release deserves a minor bump.
version-resolver:
  minor:
    labels:
      - breaking
      - enhancement
      - feature
  default: patch

# Once we ship 1.0, swap the version-resolver above for the SemVer-standard one:
#
# version-resolver:
#   major:
#     labels:
#       - breaking
#   minor:
#     labels:
#       - enhancement
#       - feature
#   patch:
#     labels:
#       - bug
#       - fix
#   default: patch

autolabeler:
  - label: breaking
    title:
      - '/^[a-z]+(\(.+\))?!:/'
      - '/BREAKING CHANGE/'
  - label: feature
    title:
      - '/^feat(\(.+\))?:/'
    branch:
      - '/feat\/.+/'
      - '/feature\/.+/'
  - label: bug
    title:
      - '/^fix(\(.+\))?:/'
    branch:
      - '/fix\/.+/'
  - label: perf
    title:
      - '/^perf(\(.+\))?:/'
  - label: docs
    title:
      - '/^docs(\(.+\))?:/'
    files:
      - '*.md'
      - 'docs/**'
  - label: refactor
    title:
      - '/^refactor(\(.+\))?:/'
  - label: test
    title:
      - '/^test(\(.+\))?:/'
  - label: build
    title:
      - '/^build(\(.+\))?:/'
  - label: ci
    title:
      - '/^ci(\(.+\))?:/'
  - label: chore
    title:
      - '/^chore(\(.+\))?:/'
